  - id: CLM-0635
    text: W półprzewodnikach Polska powinna wybierać węzły łańcucha takie jak projektowanie, materiały, fotonika, elektronika mocy, back-end, integracja i test dopiero po porównaniu przewagi krajowej, popytu i kosztu alternatyw, a nie deklarować budowę kompletnej najnowocześniejszej fabryki procesorów jako cel obronny.
