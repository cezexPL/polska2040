  - id: CLM-0631
    text: Program powinien utworzyć rozproszoną sieć serwisową opartą na wspólnych danych technicznych, narzędziach testowych, szkoleniu, częściach i telemetrii jakości, bez publikowania wrażliwych lokalizacji i stanów zapasów.
