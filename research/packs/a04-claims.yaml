    sensitivity: public
    notes: "Fakt dotyczy jawnego podsumowania planu NATO, nie niejawnych wymagań zdolnościowych."

  - id: CLM-0402
    text: NATO uznaje dane i AI za kluczowe czynniki autonomii, a wobec systemów autonomicznych wspomaganych AI stosuje zasady odpowiedzialnego użycia obejmujące legalność, odpowiedzialność, identyfikowalność, niezawodność, sterowalność i ograniczanie stronniczości.
