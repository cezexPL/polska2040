  - id: CLM-0403
    text: EDA ujmuje systemy autonomiczne w domenach lądowej, powietrznej, morskiej i międzydomenowej oraz obejmuje planem zarówno pojedyncze systemy, systemy współpracujące, jak i współdziałanie człowiek–maszyna.
