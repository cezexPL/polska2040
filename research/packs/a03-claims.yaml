    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Owner: Komitet Sterujący. Rezultat: cele P50/P90 według toru dojrzałości. Bramka: bazowa analiza kohort 2025–2026. Stop-rule: rewizja celu, gdy wymusza obchodzenie prawa, bezpieczeństwa lub jakości dowodu. Ryzyko: optymalizacja pod szybkość kosztem efektu."

  - id: CLM-0324
    text: Należy prowadzić jeden rejestr kohortowy z datami bramek, właścicielem problemu, podstawą prawną, ścieżką finansowania, wynikiem testu, decyzją zakupową, dostawą, skalowaniem lub zamknięciem oraz powodami odrzucenia.
