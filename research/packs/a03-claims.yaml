  - id: CLM-0313
    text: NATO wskazuje ogólną ambicję znajdowania, testowania i przyjmowania nowych produktów technologicznych w terminie 24 miesięcy, przy czym samo źródło zastrzega, że czas zależy od poziomu gotowości technologicznej i charakteru produktu.
    type: FACT
    status: unverified
    source_ids: [SRC-0308]
    locators: ["SRC-0308: para 6 i przypis 5"]
    as_of: "2026-07-21"
    confidence: high
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "24 miesiące to ambicja sojusznicza, nie ustawowy termin ani uniwersalne SLA dla każdego projektu."

  - id: CLM-0314
    text: NATO zaleca łączenie wyzwań innowacyjnych i eksperymentów operacyjnych z wcześniej zidentyfikowanymi ścieżkami kontraktowania, które umożliwią szybkie pozyskanie przetestowanych rozwiązań, gdy spełniają istotne wymagania.
    type: FACT
    status: unverified
    source_ids: [SRC-0308]
    locators: ["SRC-0308: para 7 pkt 3"]
    as_of: "2026-07-21"
    confidence: high
