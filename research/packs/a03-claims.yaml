claims:
  - id: CLM-0301
    text: Prawo zamówień publicznych stosuje się do zamówień w dziedzinach obronności i bezpieczeństwa udzielanych przez zamawiających publicznych i sektorowych, gdy wartość jest równa progom unijnym lub je przekracza, z zastrzeżeniem ustawowych wyłączeń.
    type: FACT
    status: unverified
    source_ids: [SRC-0301]
    locators: ["SRC-0301: art. 2 ust. 1 pkt 3"]
    as_of: "2026-07-21"
    confidence: high
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Treść sprawdzona przez autora w źródle A1; zgodnie z kontraktem agentowym wymaga niezależnej recenzji przed oznaczeniem verified."

  - id: CLM-0302
    text: Wyłączenie usług badawczych lub rozwojowych spod PZP nie jest automatyczne; art. 11 ust. 1 pkt 3 wiąże zastosowanie ustawy z określonymi kodami CPV oraz łącznym spełnieniem warunków wyłącznej korzyści zamawiającego i pełnego finansowania przez zamawiającego.
    type: FACT
    status: unverified
    source_ids: [SRC-0301]
    locators: ["SRC-0301: art. 11 ust. 1 pkt 3"]
    as_of: "2026-07-21"
    confidence: high
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Wniosek opisuje konstrukcję przepisu, nie przesądza kwalifikacji konkretnej umowy. Wymagana recenzja A09 lub radcy prawnego."

  - id: CLM-0303
    text: Wyłączenie PZP ze względu na informacje niejawne, szczególne środki bezpieczeństwa lub istotny interes bezpieczeństwa państwa działa tylko w zakresie, w jakim ochrony tego interesu nie można zapewnić w inny sposób, w szczególności przy użyciu działu VI PZP.
    type: FACT
    status: unverified
    source_ids: [SRC-0301]
    locators: ["SRC-0301: art. 12 ust. 1 pkt 1"]
    as_of: "2026-07-21"
    confidence: high
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Przepis nie wspiera blankietowego wyłączenia wszystkich zakupów programu. Wymaga niezależnej recenzji prawnej."

  - id: CLM-0304
    text: W zamówieniach w dziedzinach obronności i bezpieczeństwa PZP wyłącza stosowanie przepisów właściwych dla przetargu nieograniczonego, partnerstwa innowacyjnego, dynamicznego systemu zakupów i konkursu.
    type: FACT
    status: unverified
    source_ids: [SRC-0301]
    locators: ["SRC-0301: art. 395 ust. 3"]
    as_of: "2026-07-21"
    confidence: high
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Fakt ogranicza możliwość mechanicznego przeniesienia cywilnego modelu partnerstwa innowacyjnego do zamówienia obronnego."

  - id: CLM-0305
    text: PZP przewiduje dla zamówień obronnych przetarg ograniczony i negocjacje z ogłoszeniem, a w określonych przypadkach dialog konkurencyjny, negocjacje bez ogłoszenia lub zamówienie z wolnej ręki; kryteria mogą obejmować poza ceną lub kosztem m.in. bezpieczeństwo dostaw, interoperacyjność i właściwości operacyjne.
    type: FACT
    status: unverified
    source_ids: [SRC-0301]
    locators: ["SRC-0301: art. 410 ust. 1–2 i art. 417 ust. 1"]
    as_of: "2026-07-21"
    confidence: high
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Treść przepisów nie oznacza, że każdy tryb jest dostępny w każdej sytuacji; wybór wymaga dokumentowanej podstawy prawnej."

  - id: CLM-0306
    text: Jedną z przesłanek negocjacji bez ogłoszenia w zamówieniach obronnych są produkty wytwarzane jedynie do celów prac badawczych i rozwojowych, ale przepis wyłącza z tej przesłanki produkcję seryjną służącą osiągnięciu zysku lub pokryciu kosztów badań lub rozwoju.
    type: FACT
    status: unverified
    source_ids: [SRC-0301]
    locators: ["SRC-0301: art. 414 ust. 2 pkt 1"]
    as_of: "2026-07-21"
    confidence: high
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Wspiera rozdzielenie umowy na eksperyment od zgodnej z prawem ścieżki zakupu seryjnego; nie jest poradą dla konkretnego postępowania."

  - id: CLM-0307
    text: Art. 2 ust. 5 ustawy z 25 lipca 2025 r. wyłącza PZP dla zamówień Sił Zbrojnych RP dotyczących wskazanych systemów bezzałogowych i środków ich zwalczania, jeżeli rozwiązanie przetestowano w Siłach Zbrojnych RP, otrzymało pozytywną rekomendację z testów i Minister Obrony Narodowej zgodził się na zakup.
    type: FACT
    status: unverified
    source_ids: [SRC-0302, SRC-0303]
    locators: ["SRC-0302: art. 2 ust. 5", "SRC-0303: art. 5 nie zmienia art. 2 ust. 5"]
    as_of: "2026-07-21"
    confidence: high
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "To wyłączenie jest przedmiotowe i warunkowe; stan prawny trzeba sprawdzić ponownie tuż przed zastosowaniem."

  - id: CLM-0308
    text: Publiczne ogłoszenie MON o testach na podstawie decyzji nr 123/MON wskazuje cztery zasady procesu — oparcie o jednostki organizacyjne Sił Zbrojnych, rozproszone testowanie, uczciwą, transparentną i konkurencyjną procedurę oraz uproszczoną weryfikację kontrwywiadowczą dostawców.
    type: FACT
    status: unverified
    source_ids: [SRC-0305]
    locators: ["SRC-0305: założenia 1–4"]
    as_of: "2026-07-21"
    confidence: high
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Fakt dotyczy jawnego opisu procedury, a nie oceny jakości każdego przeprowadzonego testu."

  - id: CLM-0309
    text: MON przypisuje Agencji Uzbrojenia role obejmujące definiowanie wymagań sprzętowych dla potrzeb operacyjnych, inicjowanie prac B+R, prowadzenie procedur pozyskiwania, nadzór jakości oraz zarządzanie prawami własności intelektualnej powstałymi z B+R.
    type: FACT
    status: unverified
    source_ids: [SRC-0304]
    locators: ["SRC-0304: sekcja Zadania"]
    as_of: "2026-07-21"
    confidence: high
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Opis z oficjalnej strony MON; nie przesądza szczegółowego podziału odpowiedzialności w każdym trybie specjalnym."

  - id: CLM-0310
    text: Według komunikatu MON z 22 kwietnia 2026 r. do programu innowacji dla Tarczy Wschód wpłynęło ponad 715 zgłoszeń, przetestowano 36 rozwiązań, a po testach zapowiedziano raport i rekomendacje dotyczące możliwości wdrożenia.
    type: FACT
    status: unverified
    source_ids: [SRC-0306]
    locators: ["SRC-0306: akapity o 715 zgłoszeniach, 36 testach i raporcie dla MON"]
    as_of: "2026-04-22"
    confidence: high
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Liczby są migawką kohorty na datę publikacji i nie powinny być łączone z późniejszymi kohortami bez uzgodnienia definicji."

  - id: CLM-0311
    text: Jawny komunikat o Tarczy Wschód nie podaje kompletnej liczby rekomendacji pozytywnych, podpisanych umów, pierwszych dostaw, skalowań, zamknięć projektów ani median czasu przejścia między etapami.
    type: UNKNOWN
    status: unverified
