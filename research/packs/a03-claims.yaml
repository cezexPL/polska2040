    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Owner: MON, Agencja Uzbrojenia, UZP i RCL. Rezultat: zatwierdzona macierz kwalifikacyjna i wzory dokumentów. Bramka: opinia prawna dla każdej ścieżki. Stop-rule: brak analogii rozszerzającej wyjątek. Ryzyko: niezgodne z prawem lub niekonkurencyjne zamówienie."

  - id: CLM-0327
    text: Ocena testu i decyzja o zakupie powinny wymagać rozdzielenia ról, ujawnienia konfliktów interesów, wspólnej karty wyników dla porównywalnych rozwiązań oraz niezależnego podpisu użytkownika, kierownika testu i funkcji bezpieczeństwa.
