  - id: CLM-0326
    text: MON powinien przyjąć playbook wyboru ścieżki prawnej, który rozdzieli zakup na podstawie PZP, prace B+R, test bez obietnicy zakupu oraz wąskie wyłączenie z art. 2 ust. 5 ustawy z 25 lipca 2025 r.
