    notes: "Owner: Premier/KPRM i MON. Rezultat: karta operacyjna oraz RACI. Bramka: brak dublowania kompetencji ustawowych. Stop-rule: projekt wstrzymany, jeśli tworzy równoległą selekcję dostawców. Ryzyko: dodatkowa biurokracja."

  - id: CLM-0320
    text: Każdy projekt powinien przechodzić przez jawnie zdefiniowane bramki — karta problemu, rozeznanie i kwalifikacja, prototyp, test, ograniczona partia ucząca, skalowanie albo zamknięcie oraz przegląd cyklu życia.
    type: RECOMMENDATION
    status: unverified
    source_ids: [SRC-0308, SRC-0310, SRC-0311]
    locators: ["SRC-0308: paras 6–7", "SRC-0310: phase-based development and OPEX"]
    as_of: "2026-07-21"
    confidence: not-applicable
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Owner: MON — użytkownik sponsorujący i Agencja Uzbrojenia. Rezultat: decyzja go/iterate/stop na każdej bramce. Stop-rule: brak właściciela problemu, podstawy bezpieczeństwa, danych testowych lub legalnej ścieżki pozyskania. Ryzyko: pozorna zwinność bez odpowiedzialności."

  - id: CLM-0321
    text: Przed finansowaniem prototypu lub eksperymentu należy wskazać hipotezę legalnej ścieżki kontraktowej, właściciela budżetu i warunki przejścia do następnego etapu; test bez takiej ścieżki powinien być jawnie oznaczony jako badanie bez obietnicy zakupu.
    type: RECOMMENDATION
    status: unverified
    source_ids: [SRC-0301, SRC-0308]
    locators: ["SRC-0301: ograniczenia trybów i R&D", "SRC-0308: para 7 pkt 3"]
    as_of: "2026-07-21"
    confidence: not-applicable
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Owner: Agencja Uzbrojenia wraz z prawnikiem zamówieniowym i właścicielem budżetu. Rezultat: karta ścieżki zakupu. Bramka: podpis trzech właścicieli. Stop-rule: brak zgodnej podstawy lub finansowania. Ryzyko: przedwczesne zobowiązanie wobec dostawcy."

  - id: CLM-0322
    text: Wielkość małej partii powinna wynikać z planu uczenia — liczby niezależnych użytkowników, scenariuszy, cykli serwisowych i danych potrzebnych do decyzji — a nie z jednego uniwersalnego przedziału sztuk dla wszystkich klas rozwiązań.
    type: RECOMMENDATION
    status: unverified
    source_ids: [SRC-0308, SRC-0310]
    locators: ["SRC-0308: zależność tempa od TRL i natury produktu", "SRC-0310: fazowy model i walidacja"]
