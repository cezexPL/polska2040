  - id: CLM-0325
    text: Warunki stop powinny być określone przed wydaniem środków i obejmować co najmniej naruszenie bezpieczeństwa, niewiarygodność danych, brak postępu względem kamienia milowego, przekroczenie limitu kosztu, brak ścieżki pozyskania oraz utratę istotności problemu użytkownika.
