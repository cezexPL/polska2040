    confidence: medium
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Nie wyklucza istnienia wewnętrznego lub niejawnego systemu. Uzasadnia audyt stanu faktycznego przed projektowaniem nowych struktur."

  - id: CLM-0318
    text: Publiczne źródła użyte w pakiecie A03 nie pozwalają ustalić krajowej mediany czasu od zaakceptowania problemu użytkownika do umowy pilotażowej ani od prototypu do pierwszej partii.
    type: UNKNOWN
