    notes: "Brak danych w jednym komunikacie nie dowodzi, że państwo ich nie posiada; oznacza wyłącznie brak publicznej podstawy do policzenia konwersji."

  - id: CLM-0312
    text: Poligon Innowatora ma według MON przyspieszać identyfikację, testowanie i wdrażanie, dokumentować testy oraz wspierać zgodność regulacyjną, lecz publiczna strona inicjatywy nie przedstawia kompletnej, mierzalnej ścieżki test–kontrakt–skalowanie.
    type: INFERENCE
    status: unverified
    source_ids: [SRC-0307]
    locators: ["SRC-0307: cele inicjatywy i brak opisu konwersji kontraktowej"]
    as_of: "2026-07-21"
