    notes: "To najbardziej bezpośredni aktualny wzorzec dla zasady, że ścieżka kontraktowa powinna być znana przed rozpoczęciem testu."

  - id: CLM-0315
    text: DIANA opisuje finansowanie akceleracji i testów oraz dostęp do ponad 200 centrów testowych, ale publiczny opis programu nie obiecuje automatycznego zamówienia seryjnego przez państwo po ukończeniu programu.
    type: INFERENCE
    status: unverified
    source_ids: [SRC-0309]
    locators: ["SRC-0309: Funding & Testing; Mission Track; brak gwarancji zakupu"]
    as_of: "2026-07-21"
    confidence: high
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Wniosek zapobiega myleniu akceleracji i TEVV z krajowym kontraktem."

  - id: CLM-0316
    text: HEDI 2.0 i kampania OPEX EDA łączą wyzwania, fazowy rozwój, testy z użytkownikiem, porównywalne dowody i informację zwrotną; uczestników OPEX 2025 wybrano po konkurencyjnym postępowaniu, ale eksperyment nie jest sam w sobie dowodem późniejszego zakupu seryjnego.
    type: FACT
    status: unverified
    source_ids: [SRC-0310, SRC-0311]
    locators: ["SRC-0310: Innovators Forge i Uptake of Innovation", "SRC-0311: Areas to be tested"]
    as_of: "2026-07-21"
    confidence: high
    author: A03
    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Źródła wspierają wzorzec eksperymentowania, nie twierdzenie o automatycznej adopcji przez państwa członkowskie."

  - id: CLM-0317
    text: Polska posiada już publicznie widoczne elementy szybkiej adopcji — właściciela pozyskiwania, wyspecjalizowane testy, Poligon Innowatora i portfel innowacji — lecz z jawnych źródeł nie da się wykazać jednego kohortowego systemu łączącego wszystkie elementy z kontraktem, pierwszą partią, skalowaniem i zamknięciem.
    type: INFERENCE
    status: unverified
    source_ids: [SRC-0304, SRC-0305, SRC-0306, SRC-0307]
    locators: ["SRC-0304–SRC-0307: zestawienie ról i opisów inicjatyw"]
