    reviewer: A03
    used_in: []
    sensitivity: public
    notes: "Owner: użytkownik sponsorujący z niezależnym kierownikiem testu i Agencją Uzbrojenia. Rezultat: uzasadnienie próby i limit kosztu. Bramka: wystarczalność danych do decyzji. Stop-rule: brak celu uczenia lub nieproporcjonalny koszt. Ryzyko: zbyt mała próba albo ukryty zakup seryjny."

  - id: CLM-0323
    text: Cel 90 dni od zaakceptowanej karty problemu do umowy pilotażowej oraz 12 miesięcy od gotowego do testu prototypu do pierwszej partii może być użyty jako scenariusz dla projektów o odpowiedniej dojrzałości, ale nie jako bezwarunkowe SLA całego portfela.
