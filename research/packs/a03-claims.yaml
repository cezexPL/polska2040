  - id: CLM-0319
    text: Należy zbudować wspólny system operacyjny wokół istniejących instytucji, zamiast powoływać nową agencję zakupową; Biuro Realizacji w KPRM powinno mierzyć przepływ i eskalować zatory, ale nie wybierać dostawców.
    type: RECOMMENDATION
    status: unverified
    source_ids: [SRC-0304, SRC-0306, SRC-0307]
    locators: ["SRC-0304: zakres AU", "SRC-0306–SRC-0307: istniejące testy i inicjatywy"]
    as_of: "2026-07-21"
    confidence: not-applicable
