  - id: CLM-0904
    text: "Pełnomocnika Rządu do określonych spraw ustanawia Rada Ministrów w drodze rozporządzenia, funkcję tę co do zasady może pełnić sekretarz stanu albo podsekretarz stanu, a Prezesa Rady Ministrów ustawa wskazuje jako organ powołujący i odwołujący pełnomocnika."
    type: FACT
    status: verified
