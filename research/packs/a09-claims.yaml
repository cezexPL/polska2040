    sensitivity: public
    notes: "Tajemnica przedsiębiorstwa nie jest kategorią informacji niejawnej i wymaga własnego reżimu umownego i organizacyjnego."

  - id: CLM-0912
    text: "Prawo do informacji publicznej może być ograniczone ze względu na ochronę informacji niejawnych, innych ustawowo chronionych tajemnic, prywatności oraz tajemnicy przedsiębiorcy, ale kwalifikacja ograniczenia wymaga podstawy prawnej i nie wynika wyłącznie z oznaczenia dokumentu jako poufnego."
