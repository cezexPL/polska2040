  - id: CLM-0909
    text: "Art. 346 TFUE pozwala państwu członkowskiemu podejmować środki, które uważa za niezbędne dla ochrony podstawowych interesów bezpieczeństwa związanych z produkcją lub handlem bronią, amunicją i materiałami wojennymi, przy czym środki nie mogą pogarszać warunków konkurencji na rynku wewnętrznym w odniesieniu do produktów nieprzeznaczonych do celów ściśle wojskowych."
    type: FACT
    status: unverified
