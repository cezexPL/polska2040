    notes: "Zastosowanie odstępstwa należy uzasadniać dla konkretnej potrzeby i zakresu; memo nie kwalifikuje całego programu pod art. 346 TFUE."

  - id: CLM-0910
    text: "Dostęp do informacji niejawnych jest ograniczony do osób dających rękojmię zachowania tajemnicy i tylko w zakresie niezbędnym do wykonywania pracy, a systemy teleinformatyczne oraz przedsiębiorcy realizujący umowy z informacjami niejawnymi podlegają odrębnym wymaganiom akredytacji i bezpieczeństwa przemysłowego."
    type: FACT
    status: verified
    source_ids: [SRC-0909]
    locators: ["SRC-0909: art. 4–5, 48 i 54–71"]
    as_of: "2026-07-21"
