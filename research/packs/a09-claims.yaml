  - id: CLM-0906
    text: "W zamówieniach w dziedzinach obronności i bezpieczeństwa polskie Prawo zamówień publicznych wyłącza zastosowanie przetargu nieograniczonego, partnerstwa innowacyjnego, dynamicznego systemu zakupów i konkursu."
