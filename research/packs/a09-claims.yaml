    reviewer: null
    used_in: [research/packs/a09-law-ethics-memo.md]
    sensitivity: public
    notes: "Wybór między strategią rozwoju a polityką publiczną wymaga sprawdzenia zakresu, horyzontu, zgodności z obowiązującymi strategiami i trybu oceny środowiskowej."

  - id: CLM-0903
    text: "Program w rozumieniu ustawy o zasadach prowadzenia polityki rozwoju jest dokumentem wykonawczym realizującym strategię rozwoju i powinien zawierać między innymi system realizacji oraz plan finansowy."
