  - id: CLM-0926
    text: "Unijne ramy screeningu inwestycji zagranicznych wskazują jako czynniki bezpieczeństwa między innymi infrastrukturę krytyczną, technologie krytyczne i produkty dual-use, dostęp do informacji wrażliwych, pluralizm mediów oraz kontrolę inwestora przez rząd państwa trzeciego."
