  - id: CLM-0908
    text: "W zamówieniu obronnym lub bezpieczeństwa zamawiający może stawiać wymagania dotyczące ochrony informacji oraz bezpieczeństwa dostaw, w tym zmian w łańcuchu dostaw, zwiększenia dostaw w sytuacji kryzysowej, utrzymania i modernizacji oraz określonych środków do wytwarzania części, gdy wykonawca nie może ich dalej zapewnić."
