    reviewer: A12
    used_in: [research/packs/a09-law-ethics-memo.md]
    sensitivity: public
    notes: "A12 (2026-07-21): aktualny tekst ustawy o ochronie informacji niejawnych potwierdza rękojmię i zasadę need-to-know, akredytację bezpieczeństwa teleinformatycznego oraz odrębne wymogi bezpieczeństwa przemysłowego. Weryfikacja nie oznacza akredytacji tego repozytorium."

  - id: CLM-0911
    text: "Tajemnica przedsiębiorstwa obejmuje informacje posiadające wartość gospodarczą, które nie są powszechnie znane ani łatwo dostępne dla osób zwykle zajmujących się takim rodzajem informacji, jeżeli uprawniony podjął przy zachowaniu należytej staranności działania w celu utrzymania ich poufności."
    type: FACT
    status: unverified
    source_ids: [SRC-0910]
    locators: ["SRC-0910: art. 11 ust. 2"]
    as_of: "2026-07-21"
