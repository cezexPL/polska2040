    text: "Utworzenie wspólnego przedsiębiorcy może podlegać kontroli koncentracji, a finansowanie i transakcje programu mogą wymagać odrębnej oceny pod kątem pomocy państwa oraz unijnego rozporządzenia o subsydiach zagranicznych."
