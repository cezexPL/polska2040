  - id: CLM-0920
    text: "Strategiczna ocena oddziaływania na środowisko może być wymagana dla strategii, polityki lub programu wyznaczającego ramy dla przedsięwzięć mogących znacząco oddziaływać na środowisko; wyłączenie obronne dotyczy dokumentów przygotowywanych wyłącznie dla obrony narodowej lub obrony cywilnej i nie usuwa zastrzeżenia dotyczącego obszarów Natura 2000."
