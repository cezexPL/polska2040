  - id: CLM-0907
    text: "Dla zamówień w dziedzinach obronności i bezpieczeństwa ustawa przewiduje jako podstawowe tryby przetarg ograniczony oraz negocjacje z ogłoszeniem, a dialog konkurencyjny, negocjacje bez ogłoszenia i zamówienie z wolnej ręki są dostępne w warunkach określonych ustawą."
    type: FACT
    status: verified
    source_ids: [SRC-0906, SRC-0907]
    locators: ["SRC-0906: art. 410", "SRC-0907: Articles 25–28"]
    as_of: "2026-07-21"
