    sensitivity: public
    notes: "A12 (2026-07-21): art. 93 Konstytucji potwierdza wewnętrzny charakter uchwał RM, związanie jednostek organizacyjnie podległych oraz zakaz użycia ich jako podstawy decyzji wobec obywateli, osób prawnych i innych podmiotów."

  - id: CLM-0902
    text: "Ustawa o zasadach prowadzenia polityki rozwoju rozróżnia strategie rozwoju, programy będące dokumentami wykonawczymi oraz polityki publiczne, określa role właściwych ministrów i Rady Ministrów oraz przewiduje konsultacje projektów wskazanych dokumentów."
    type: FACT
    status: unverified
    source_ids: [SRC-0902]
    locators: ["SRC-0902: art. 6, 9–15 i 21d–21f"]
    as_of: "2026-07-21"
