claims:
  - id: CLM-0901
    text: "Uchwały Rady Ministrów mają charakter wewnętrzny, wiążą jednostki organizacyjnie podległe organowi wydającemu i nie mogą stanowić podstawy decyzji wobec obywateli, osób prawnych ani innych podmiotów."
    type: FACT
    status: verified
