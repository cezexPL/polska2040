  - id: CLM-0921
    text: "AI Act nie stosuje się do systemów AI wyłącznie w zakresie, w jakim są wprowadzane do obrotu, oddawane do użytku lub używane wyłącznie do celów wojskowych, obronnych lub bezpieczeństwa narodowego; system używany również do celów cywilnych wymaga odrębnej oceny zakresu rozporządzenia."
