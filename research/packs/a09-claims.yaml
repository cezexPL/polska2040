  - id: CLM-0917
    text: "Unijny reżim kontroli produktów podwójnego zastosowania obejmuje nie tylko towary, lecz także oprogramowanie, technologię, pośrednictwo i pomoc techniczną, przewiduje mechanizmy catch-all oraz wymogi dokumentacyjne i ewidencyjne."
