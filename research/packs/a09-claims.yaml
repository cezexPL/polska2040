  - id: CLM-0916
    text: "Obrót z zagranicą uzbrojeniem i towarami o znaczeniu strategicznym podlega zezwoleniom i wymaganiom właściwym dla danej kategorii, a aktualna procedura MRiT przewiduje między innymi dokumenty dotyczące użytkownika końcowego, kontraktu oraz — dla określonych operacji — certyfikowany wewnętrzny system kontroli."
