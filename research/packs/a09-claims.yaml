    notes: "A12 (2026-07-21): art. 10 ustawy o Radzie Ministrów potwierdza ustanowienie pełnomocnika rozporządzeniem RM, zasadniczo rangę sekretarza lub podsekretarza stanu oraz powołanie i odwołanie przez Prezesa RM. Nazwa polityczna nie zmienia ustawowego statusu."

  - id: CLM-0905
    text: "O tym, czy porozumienie z innym państwem jest umową międzynarodową, decydują jego treść, strony i podleganie prawu międzynarodowemu, a nie użycie nazwy memorandum, deklaracja lub umowa ramowa."
