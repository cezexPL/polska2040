  - id: CLM-0913
    text: "Dla przetwarzania danych osobowych objętego RODO trzeba wskazać zgodny z prawem cel i podstawę, stosować minimalizację, ochronę danych w fazie projektowania i odpowiednie zabezpieczenia, a przy prawdopodobnym wysokim ryzyku przeprowadzić ocenę skutków dla ochrony danych."
    type: FACT
