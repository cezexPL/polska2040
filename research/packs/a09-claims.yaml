  - id: CLM-0918
    text: "Wspólne stanowisko 2008/944/WPZiB wymaga indywidualnej oceny wniosków eksportowych dotyczących technologii i sprzętu wojskowego według wspólnych kryteriów, obejmujących między innymi zobowiązania międzynarodowe, prawa człowieka, bezpieczeństwo regionalne, użytkownika końcowego i ryzyko dywersji."
