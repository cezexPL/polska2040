  - id: CLM-0915
    text: "Depozyt kodu źródłowego lub dokumentacji nie przenosi sam w sobie autorskich praw majątkowych ani nie tworzy licencji do modyfikacji, produkcji, sublicencjonowania lub udostępnienia podmiotowi zastępczemu."
