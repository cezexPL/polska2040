    text: "Program powinien używać stosu instrumentów: jawnego dokumentu strategicznego, programu wykonawczego z finansami i miernikami, właściwych aktów normatywnych dla obowiązków zewnętrznych, kontraktów dla dostaw i praw oraz chronionych instrukcji lub aneksów dla danych wrażliwych."
