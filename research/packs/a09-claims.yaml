  - id: CLM-0925
    text: "Polska kontrola niektórych inwestycji może mieć zastosowanie do przejęcia, utworzenia JV lub uzyskania istotnego uczestnictwa lub dominacji, zależnie od statusu podmiotu chronionego, inwestora, progów, zakresu działalności i konstrukcji transakcji."
