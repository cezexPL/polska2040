  - id: CLM-0914
    text: "Prawa wyłączne do programu komputerowego obejmują między innymi zwielokrotnianie, modyfikację i rozpowszechnianie, a ustawowe uprawnienia legalnego posiadacza do kopii zapasowej, obserwacji, testowania lub dekompilacji mają ograniczony zakres i warunki."
