  - id: CLM-0833
    text: "Pierwszy portfel powinien ograniczyć się do obszarów wysokiej wartości defensywnej i dual-use na poziomie polityki: ochrona przed systemami bezzałogowymi, odporna łączność i nawigacja, świadomość widma, robotyka logistyczna i ratownicza, ochrona infrastruktury morskiej oraz diagnostyka i serwis."
