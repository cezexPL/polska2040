  - id: CLM-0212
    text: "Inna strategia rozwoju może dotyczyć sektora lub dziedziny, może wykraczać poza horyzont średniookresowej strategii rozwoju kraju, jeśli uzasadnia to specyfika obszaru, oraz jest przyjmowana uchwałą Rady Ministrów po opinii ministra właściwego do spraw rozwoju regionalnego."
    type: FACT
    status: verified
    source_ids: [SRC-0208]
    locators: ["art. 9 pkt 3", "art. 13 ust. 1-3", "art. 14 ust. 1-6"]
    as_of: "2026-07-21"
    confidence: high
    author: A02
    reviewer: A12
    used_in: []
    sensitivity: public
    notes: "A12 (2026-07-21): potwierdzono w art. 9, 13 i 14 ustawy o zasadach prowadzenia polityki rozwoju. Dłuższy horyzont wymaga uzasadnienia specyfiką obszaru."

  - id: CLM-0213
    text: "Projekt innej strategii rozwoju wymaga diagnozy, ewaluacji ex ante i co najmniej 35-dniowych konsultacji, po których sporządza się w ciągu 30 dni sprawozdanie z uzasadnioną odpowiedzią na uwagi."
    type: FACT
    status: verified
    source_ids: [SRC-0208]
    locators: ["art. 6 ust. 1 i 4-6", "art. 10a ust. 1-2"]
    as_of: "2026-07-21"
    confidence: high
    author: A02
    reviewer: A12
    used_in: []
    sensitivity: public
    notes: "A12 (2026-07-21): art. 10a i 6 ustawy potwierdzają diagnozę, ewaluację ex ante, minimum 35 dni konsultacji oraz sprawozdanie z uzasadnionym odniesieniem do uwag w 30 dni od zakończenia konsultacji."

  - id: CLM-0214
    text: "Program rozwoju jest dokumentem operacyjno-wdrożeniowym z planem finansowym, wskaźnikami, systemem realizacji, monitorowaniem i ewaluacją; program ministra wymaga opinii ministra właściwego do spraw rozwoju regionalnego i uchwały Rady Ministrów."
    type: FACT
    status: verified
    source_ids: [SRC-0208]
    locators: ["art. 15 ust. 1 i 4 pkt 2", "art. 17 ust. 1-1a", "art. 18 pkt 3", "art. 19 ust. 1-2"]
    as_of: "2026-07-21"
    confidence: high
    author: A02
    reviewer: A12
    used_in: []
    sensitivity: public
    notes: "A12 (2026-07-21): zakres potwierdzono w art. 15, 17 i 19 ustawy; claim opisuje ustawowe minimum programu rozwoju, nie przesądza jego finansowania ani zatwierdzenia."

  - id: CLM-0215
    text: "Dla publicznego dokumentu parasolowego do 2040 r. najbardziej adekwatnym wariantem jest inna strategia rozwoju z art. 9 pkt 3, z wydzielonym okresem zgodnym z aktualną średniookresową strategią kraju, pod warunkiem potwierdzenia właściwego ministra i zgodności systemowej."
    type: INFERENCE
    status: unverified
    source_ids: [SRC-0208, SRC-0212, SRC-0213]
    locators: ["SRC-0208: art. 9 pkt 3, art. 13-14", "SRC-0212: przebieg projektu SRP2035", "SRC-0213: rekord ID132"]
