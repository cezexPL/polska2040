claims:
  - id: CLM-0201
    text: "Regulamin pracy Rady Ministrów zalicza strategie i programy do innych dokumentów rządowych oraz określa dla nich sekwencję obejmującą projekt, uzgodnienia lub konsultacje, komitety i rozpatrzenie przez Radę Ministrów."
    type: FACT
    status: unverified
    source_ids: [SRC-0201]
    locators: ["§ 19 ust. 2", "§ 21"]
    as_of: "2026-07-21"
    confidence: high
    author: A02
    reviewer: null
    used_in: []
    sensitivity: public
    notes: null

  - id: CLM-0202
    text: "Ustawa o Radzie Ministrów wymaga prowadzenia publicznego Wykazu prac legislacyjnych i programowych, obejmującego między innymi projekty strategii i programów oraz wskazanie organów odpowiedzialnych i planowanego terminu przyjęcia."
    type: FACT
    status: unverified
    source_ids: [SRC-0203]
    locators: ["art. 2 pkt 1, dodający art. 8a ust. 1-5 ustawy o Radzie Ministrów"]
    as_of: "2026-07-21"
    confidence: high
    author: A02
    reviewer: null
    used_in: []
    sensitivity: public
    notes: null

  - id: CLM-0203
    text: "Zgłoszenie strategii lub programu do wykazu powinno opisywać cele, środki realizacji, skutki i sposób pomiaru, a formalne procedowanie projektu rozpoczyna się po wpisie do właściwego wykazu."
    type: FACT
    status: unverified
    source_ids: [SRC-0201, SRC-0211]
    locators: ["SRC-0201: § 25 ust. 2, § 25a ust. 4-7, § 31", "SRC-0211: sekcja formularzy dla wykazu prac programowych"]
    as_of: "2026-07-21"
    confidence: high
    author: A02
    reviewer: null
    used_in: []
    sensitivity: public
    notes: null

  - id: CLM-0204
    text: "Koordynator OSR może zażądać oceny skutków także dla nienormatywnego dokumentu rządowego, a zasady konsultacji publicznych mogą być stosowane do takich dokumentów z uwzględnieniem ich przedmiotu i znaczenia."
    type: FACT
    status: unverified
    source_ids: [SRC-0201, SRC-0209]
    locators: ["SRC-0201: § 29 ust. 2-3, § 36 ust. 1-2", "SRC-0209: sekcje 'Ocena wpływu' i 'Konsultacje publiczne'"]
    as_of: "2026-07-21"
    confidence: high
    author: A02
    reviewer: null
    used_in: []
    sensitivity: public
    notes: null

  - id: CLM-0205
    text: "Prezes Rady Ministrów może żądać od organów administracji informacji, dokumentów i sprawozdań, powierzyć jednemu ministrowi sprawę należącą do właściwości więcej niż jednego organu oraz rozstrzygać spory kompetencyjne między ministrami."
    type: FACT
    status: verified
    source_ids: [SRC-0202]
    locators: ["art. 5 pkt 2, 6 i 7"]
    as_of: "2026-07-21"
    confidence: high
    author: A02
    reviewer: A12
    used_in: []
    sensitivity: public
    notes: "A12 (2026-07-21): zakres potwierdzono w art. 5 aktualnego tekstu ustawy o Radzie Ministrów; są to kompetencje Prezesa Rady Ministrów, a nie automatyczne przeniesienie kompetencji ustawowych ministrów."

  - id: CLM-0206
    text: "Pełnomocnika Rządu ustanawia Rada Ministrów dla spraw, których przekazanie członkom Rady Ministrów nie jest celowe; pełnomocnikiem jest co do zasady sekretarz albo podsekretarz stanu, a zakres i obsługę określa rozporządzenie Rady Ministrów."
    type: FACT
    status: verified
    source_ids: [SRC-0202]
    locators: ["art. 10 ust. 1-5"]
    as_of: "2026-07-21"
    confidence: high
    author: A02
    reviewer: A12
    used_in: []
    sensitivity: public
    notes: "A12 (2026-07-21): art. 10 ustawy o Radzie Ministrów potwierdza ustanowienie pełnomocnika rozporządzeniem RM, zasadniczy status sekretarza lub podsekretarza stanu, powołanie przez Premiera oraz określenie zakresu i obsługi."

  - id: CLM-0207
    text: "Prezes Rady Ministrów może zarządzeniem tworzyć organy pomocnicze, lecz przedstawiciel Prezydenta uczestniczy już z mocy ustawy w posiedzeniach komitetu Rady Ministrów i Rady Ministrów dotyczących bezpieczeństwa i obronności państwa."
    type: FACT
    status: unverified
    source_ids: [SRC-0202]
    locators: ["art. 12 ust. 1-3", "art. 22 ust. 1b"]
    as_of: "2026-07-21"
    confidence: high
    author: A02
    reviewer: null
    used_in: []
    sensitivity: public
    notes: "Udział przedstawiciela Prezydenta nie oznacza przeniesienia konstytucyjnej odpowiedzialności Rady Ministrów ani współzarządzania programem."

  - id: CLM-0208
    text: "Minister do spraw Nadzoru nad Wdrażaniem Polityki Rządu ma obowiązujący mandat do koordynowania i monitorowania realizacji polityki i priorytetowych zadań rządu, współpracy z Zespołem do spraw Programowania Prac Rządu oraz żądania informacji z upoważnienia Prezesa Rady Ministrów."
    type: FACT
    status: verified
    source_ids: [SRC-0204]
    locators: ["§§ 1-5"]
    as_of: "2026-07-21"
    confidence: high
    author: A02
    reviewer: A12
    used_in: []
    sensitivity: public
    notes: "A12 (2026-07-21): obowiązujące rozporządzenie Dz.U. 2025 poz. 1047 potwierdza monitoring polityki i priorytetów, współpracę z zespołem programowania prac Rządu oraz pozyskiwanie informacji na podstawie upoważnienia Premiera."

  - id: CLM-0209
    text: "Istniejący Komitet Rady Ministrów do spraw Nadzoru nad Wdrażaniem Polityki Rządu może ustalać priorytety, cele cząstkowe i terminy, monitorować wykonanie, rekomendować zmiany, eskalować zagrożenia oraz modyfikować zadania zgodnie z ustaleniami Rady Ministrów."
    type: FACT
    status: unverified
    source_ids: [SRC-0205, SRC-0206]
    locators: ["SRC-0205: § 2 pkt 1-8, §§ 3-9", "SRC-0206: § 1, dodający § 2 pkt 1a"]
    as_of: "2026-07-21"
    confidence: high
    author: A02
    reviewer: null
    used_in: []
    sensitivity: public
    notes: null

  - id: CLM-0210
    text: "Departament Nadzoru nad Wdrażaniem Polityki Rządu w KPRM ma zadania obejmujące koordynację projektów strategicznych, analizę danych, ocenę wdrożenia, opiniowanie planów ministrów oraz obsługę istniejącego komitetu."
    type: FACT
    status: unverified
    source_ids: [SRC-0207]
    locators: ["sekcja zadań Departamentu, pkt 1-5 i 9"]
