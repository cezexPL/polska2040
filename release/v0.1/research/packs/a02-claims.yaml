  - id: CLM-0211
    text: "Utworzenie od początku odrębnego pełnomocnika, komitetu i biura realizacji dla programu Polska 2040 najpewniej dublowałoby aktualne kompetencje nadzoru i koordynacji KPRM."
    type: INFERENCE
    status: unverified
    source_ids: [SRC-0204, SRC-0205, SRC-0206, SRC-0207]
    locators: ["SRC-0204: §§ 1-5", "SRC-0205: §§ 1-11", "SRC-0206: § 1", "SRC-0207: pkt 1-5 i 9 opisu zadań"]
    as_of: "2026-07-21"
