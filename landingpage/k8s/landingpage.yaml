apiVersion: v1
kind: Namespace
metadata:
  name: polska2040
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: polska2040-web
  namespace: polska2040
data:
  nginx.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;
      location / { try_files $uri $uri/ /index.html; }
      location = /healthz { access_log off; return 200 'ok'; add_header Content-Type text/plain; }
      location ~* \.(css|js|svg|png|jpg|webp|woff2)$ { expires 7d; add_header Cache-Control "public, immutable"; }
      add_header X-Content-Type-Options nosniff always;
      add_header X-Frame-Options SAMEORIGIN always;
      add_header Referrer-Policy strict-origin-when-cross-origin always;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polska2040-landing
  namespace: polska2040
spec:
  replicas: 2
  selector:
    matchLabels: {app: polska2040-landing}
  template:
    metadata:
      labels: {app: polska2040-landing}
    spec:
      securityContext: {runAsNonRoot: true, runAsUser: 101, runAsGroup: 101, fsGroup: 101}
      containers:
      - name: web
        image: nginxinc/nginx-unprivileged:1.27-alpine
        ports: [{name: http, containerPort: 8080}]
        resources:
          requests: {cpu: 10m, memory: 16Mi}
          limits: {cpu: 200m, memory: 64Mi}
        readinessProbe: {httpGet: {path: /healthz, port: http}, initialDelaySeconds: 2, periodSeconds: 5}
        livenessProbe: {httpGet: {path: /healthz, port: http}, initialDelaySeconds: 10, periodSeconds: 10}
        volumeMounts:
        - {name: config, mountPath: /etc/nginx/conf.d/default.conf, subPath: nginx.conf, readOnly: true}
        - {name: content, mountPath: /usr/share/nginx/html, readOnly: true}
      volumes:
      - name: config
        configMap: {name: polska2040-web}
      - name: content
        configMap: {name: polska2040-content}
---
apiVersion: v1
kind: Service
metadata:
  name: polska2040-landing
  namespace: polska2040
spec:
  selector: {app: polska2040-landing}
  ports: [{name: http, port: 80, targetPort: http}]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: polska2040-landing
  namespace: polska2040
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
  - hosts: [poland2040.com, www.poland2040.com]
    secretName: poland2040-com-tls
  rules:
  - host: poland2040.com
    http: &routes
      paths:
      - path: /
        pathType: Prefix
        backend: {service: {name: polska2040-landing, port: {number: 80}}}
  - host: www.poland2040.com
    http: *routes
